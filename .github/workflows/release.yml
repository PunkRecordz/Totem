name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  # Job 1: Build Rust libraries on native OS platforms
  build-natives:
    name: Build Rust on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: libtotem_sys.so
            platform_dir: linux_x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output_name: libtotem_sys.so
            platform_dir: linux_aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            output_name: libtotem_sys.dylib
            platform_dir: macos_x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            output_name: libtotem_sys.dylib
            platform_dir: macos_aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: totem_sys.dll
            platform_dir: windows_x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native -> target"

      # Install cross-compilation linker for Linux ARM64 if necessary
      - name: Install aarch64 gcc (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Native Binary
        working-directory: ./native
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # Upload output files to workflow stash
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform_dir }}
          path: ./native/target/${{ matrix.target }}/release/${{ matrix.output_name }}

  # Job 2: Assemble all binaries into final multi-platform JAR and publish to GitHub Packages
  build-jar:
    name: Assemble & Publish Multi-Platform Jar
    needs: build-natives
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Download all compiled native libs from Job 1
      - name: Download Windows x86_64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-windows_x86_64
          path: src/main/resources/natives/windows_x86_64

      - name: Download Linux x86_64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux_x86_64
          path: src/main/resources/natives/linux_x86_64

      - name: Download Linux aarch64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux_aarch64
          path: src/main/resources/natives/linux_aarch64

      - name: Download MacOS x86_64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-macos_x86_64
          path: src/main/resources/natives/macos_x86_64

      - name: Download MacOS aarch64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-macos_aarch64
          path: src/main/resources/natives/macos_aarch64

      # Build and Publish JVM Jar to GitHub Packages
      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
